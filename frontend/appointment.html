<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Mind Wellness</title>
    <link rel="stylesheet" href="appointment.css">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
    <div class="nav-container">
        <div class="logo">Mind Wellness</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="about.html">About</a>
            <a href="blog.html">Blog</a>
            <a href="selfAssessment.html" class="assessment-btn">Self Assessment</a>
            <a href="appointment.html" class="active">Appointment</a>
            <a href="login.html" class="login-btn" id="loginBtn">Login</a>
<button class="logout-btn" id="logoutBtn" onclick="logout()">Logout</button>

        </div>
    </div>
</div>

<!-- ================= APPOINTMENT PAGE ================= -->
<div class="appointment-container">

    <div class="appointment-header">
        <h1>Book an Appointment</h1>
        <p>Your mental well-being matters. Schedule a session with ease.</p>
    </div>

    <div class="appointment-form">
        <form id="bookingForm">

            <!-- Full Name -->
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="fullName" placeholder="Enter your name" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>

            <!-- Phone -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phoneNumber" pattern="[0-9]{10}" placeholder="Enter 10-digit number" required>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label for="date">Preferred Date</label>
                <input type="date" id="date" required>
            </div>

            <!-- Time -->
            <div class="form-group">
                <label for="time">Preferred Time</label>
                <input type="time" id="time" required>
            </div>

            <!-- Session -->
            <div class="form-group">
                <label for="session">Session Type</label>
                <select id="session" required>
                    <option value="" disabled selected>Select Session</option>
                    <option>Stress Management</option>
                    <option>Anxiety Support</option>
                    <option>Depression Counseling</option>
                    <option>General Wellness</option>
                </select>
            </div>

            <!-- Message -->
            <div class="form-group">
                <label for="message">Message (Optional)</label>
                <textarea id="message" placeholder="Share your concern (optional)"></textarea>
            </div>

            <!-- Button -->
            <button type="submit" class="btn" id="submitBtn">Book Appointment</button>

            <!-- Success Message -->
            <p class="success-message" id="successMsg"></p>

        </form>
    </div>

</div>
<script> // Protect page
 if (!localStorage.getItem("token")) { window.location.href = "login.html"; } 
 const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn"); // On protected pages → show logout only 
  loginBtn.style.display = "none"; logoutBtn.style.display = "inline-block"; 
  function logout() { localStorage.removeItem("token"); window.location.href = "login.html"; } 
  </script> <script src="appointment.js"></script>
   </body>
