<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mind Wellness</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<!-- Navbar -->
<header class="navbar">
  <div class="nav-container">
    <div class="logo">Mind Wellness</div>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="blog.html">Blog</a>
      <!-- <a href="selfAssessment.html" class="assessment-btn">Self Assessment</a> -->
      <!-- <a href="appointment.html">Appointment</a> -->

      <!-- Login -->
      <a href="login.html" class="login-btn" id="loginBtn">Login</a>

      <!-- Logout -->
      <button class="logout-btn" id="logoutBtn" onclick="logout()">Logout</button>
    </nav>
  </div>
</header>


<!-- Login Form -->
<main class="form-wrapper">
    <div class="container">
        <h2>Login</h2>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">Login</button>
            <p>Don't have an account? <a href="register.html">Register</a></p>
        </form>

        <p id="message"></p>
    </div>
</main>

<script src="login.js"></script>
<script>
  const token = localStorage.getItem("token");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");

  if (token) {
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
  } else {
    logoutBtn.style.display = "none";
  }

  function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
  }
</script>



</body>
</html>
